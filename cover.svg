<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020810"/>
    <stop offset="65%" stop-color="#060e19"/>
    <stop offset="100%" stop-color="#0d1a2e"/>
  </linearGradient>
  <radialGradient id="moonGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a2e46"/>
    <stop offset="100%" stop-color="#0d1e35"/>
  </radialGradient>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8d08a"/>
    <stop offset="100%" stop-color="#b8922a"/>
  </linearGradient>
  <linearGradient id="cometGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#060e19" stop-opacity="0"/>
    <stop offset="100%" stop-color="#e8c96a" stop-opacity="0.9"/>
  </linearGradient>
  <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="blur14"><feGaussianBlur stdDeviation="14"/></filter>
</defs>

<!-- Sky -->
<rect width="400" height="600" fill="url(#bg)"/>

<!-- Moon glow -->
<circle cx="292" cy="128" r="96" fill="#0f2040" filter="url(#blur14)" opacity="0.65"/>

<!-- Moon -->
<circle cx="292" cy="128" r="62" fill="url(#moonGrad)"/>
<circle cx="292" cy="128" r="60" fill="none" stroke="#2a4565" stroke-width="1.5" opacity="0.5"/>
<!-- Moon craters -->
<circle cx="274" cy="120" r="13" fill="#0b1c32" opacity="0.42"/>
<circle cx="306" cy="142" r="9"  fill="#0b1c32" opacity="0.36"/>
<circle cx="288" cy="150" r="7"  fill="#0b1c32" opacity="0.28"/>
<circle cx="302" cy="112" r="5"  fill="#0b1c32" opacity="0.22"/>

<!-- Stars -->
<g fill="white">
  <circle cx="28"  cy="38"  r="1"   opacity="0.8"/>
  <circle cx="52"  cy="22"  r="1.3" opacity="0.9"/>
  <circle cx="75"  cy="52"  r="0.8" opacity="0.7"/>
  <circle cx="110" cy="18"  r="1.1" opacity="0.85"/>
  <circle cx="132" cy="44"  r="0.7" opacity="0.75"/>
  <circle cx="158" cy="28"  r="1"   opacity="0.8"/>
  <circle cx="182" cy="62"  r="0.6" opacity="0.7"/>
  <circle cx="205" cy="34"  r="1.2" opacity="0.55"/>
  <circle cx="222" cy="54"  r="0.7" opacity="0.7"/>
  <circle cx="356" cy="28"  r="0.9" opacity="0.8"/>
  <circle cx="375" cy="52"  r="0.7" opacity="0.7"/>
  <circle cx="348" cy="60"  r="1"   opacity="0.75"/>
  <circle cx="340" cy="82"  r="0.6" opacity="0.65"/>
  <circle cx="370" cy="98"  r="0.8" opacity="0.7"/>
  <circle cx="22"  cy="98"  r="0.7" opacity="0.7"/>
  <circle cx="45"  cy="118" r="1.1" opacity="0.8"/>
  <circle cx="68"  cy="88"  r="0.8" opacity="0.7"/>
  <circle cx="95"  cy="142" r="0.6" opacity="0.65"/>
  <circle cx="122" cy="110" r="0.9" opacity="0.6"/>
  <circle cx="148" cy="82"  r="0.7" opacity="0.75"/>
  <circle cx="378" cy="110" r="0.7" opacity="0.7"/>
  <circle cx="350" cy="132" r="0.6" opacity="0.65"/>
  <circle cx="35"  cy="168" r="0.7" opacity="0.6"/>
  <circle cx="62"  cy="152" r="0.8" opacity="0.65"/>
  <!-- Brighter accent stars -->
  <circle cx="48"  cy="45"  r="1.6" opacity="0.95"/>
  <circle cx="172" cy="15"  r="1.4" opacity="0.9"/>
  <circle cx="365" cy="40"  r="1.5" opacity="0.85"/>
  <circle cx="105" cy="72"  r="1.3" opacity="0.9"/>
</g>

<!-- Comet streak -->
<line x1="42" y1="78" x2="228" y2="162" stroke="url(#cometGrad)" stroke-width="1.8" stroke-linecap="round"/>
<line x1="48" y1="72" x2="196" y2="148" stroke="#e8c96a" stroke-width="0.5" opacity="0.22"/>
<!-- Comet head -->
<circle cx="228" cy="162" r="3"   fill="#e8d08a" opacity="0.92"/>
<circle cx="228" cy="162" r="7"   fill="#c9a84c" opacity="0.18" filter="url(#blur4)"/>

<!-- Hills / landscape silhouette (back layer) -->
<path d="M 0,460 C 22,442 48,450 68,440 C 92,428 115,420 138,413 C 162,404 178,400 196,410
         C 214,420 230,424 252,412 C 274,398 292,392 312,404 C 332,416 352,418 372,405
         C 386,396 396,398 400,394 L 400,600 L 0,600 Z"
      fill="#030c18"/>
<!-- Hills / front layer -->
<path d="M 0,478 C 32,462 58,470 84,462 C 110,453 134,448 158,456
         C 182,464 206,462 228,452 C 250,440 274,445 298,454
         C 320,462 344,458 366,446 C 382,438 394,442 400,440
         L 400,600 L 0,600 Z"
      fill="#020a14"/>

<!-- WOLF SILHOUETTE — sitting, howling toward moon (upper-right) -->
<!-- All shapes filled same near-black; overlapping fills gaps -->
<g fill="#030c18">
  <!-- Main body / haunches -->
  <ellipse cx="192" cy="418" rx="52" ry="36"/>
  <!-- Left rear haunch -->
  <ellipse cx="156" cy="432" rx="30" ry="23"/>
  <!-- Right rear haunch -->
  <ellipse cx="228" cy="430" rx="28" ry="21"/>
  <!-- Torso -->
  <ellipse cx="182" cy="382" rx="30" ry="36"/>
  <!-- Chest -->
  <ellipse cx="176" cy="356" rx="22" ry="26"/>

  <!-- Neck (angled up-right toward moon) — filled quadrilateral -->
  <polygon points="164,346 186,338 228,282 206,290"/>

  <!-- Head — elongated ellipse tilted ~30° toward upper-right -->
  <ellipse cx="236" cy="268" rx="26" ry="18" transform="rotate(-28 236 268)"/>

  <!-- Snout extension pointing toward moon -->
  <polygon points="248,255 278,232 282,246 252,266"/>

  <!-- Back ear (toward body) -->
  <polygon points="218,264 210,242 228,254"/>
  <!-- Front ear (toward snout) -->
  <polygon points="238,254 244,230 258,246"/>

  <!-- Front left leg -->
  <rect x="160" y="402" width="16" height="48" rx="6"/>
  <!-- Front right leg -->
  <rect x="184" y="402" width="15" height="48" rx="6"/>
  <!-- Left paw -->
  <ellipse cx="168" cy="450" rx="13" ry="7"/>
  <!-- Right paw -->
  <ellipse cx="192" cy="450" rx="12" ry="7"/>

  <!-- Rear legs (hind, partially behind body) -->
  <rect x="140" y="428" width="14" height="30" rx="5"/>
  <rect x="224" y="428" width="14" height="28" rx="5"/>
  <!-- Rear paws -->
  <ellipse cx="147" cy="458" rx="13" ry="7"/>
  <ellipse cx="231" cy="456" rx="12" ry="6"/>

  <!-- Tail curling from right rump -->
  <path d="M 240,422 C 264,412 278,392 272,370 C 266,350 248,345 240,356"
        fill="none" stroke="#030c18" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 240,422 C 264,412 278,392 272,370 C 266,350 248,345 240,356"
        fill="none" stroke="#020a14" stroke-width="10" stroke-linecap="round"/>
</g>

<!-- Ground shadow -->
<ellipse cx="196" cy="458" rx="68" ry="9" fill="#020912" opacity="0.55"/>

<!-- Decorative border frame -->
<rect x="14" y="14" width="372" height="572" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.28"/>
<rect x="19" y="19" width="362" height="562" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.14"/>

<!-- Corner L-brackets -->
<g stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.38">
  <polyline points="14,40  14,14  40,14"/>
  <polyline points="360,14 386,14 386,40"/>
  <polyline points="14,560 14,586 40,586"/>
  <polyline points="360,586 386,586 386,560"/>
</g>

<!-- Title area panel -->
<rect x="28" y="464" width="344" height="112" fill="#020912" opacity="0.9"/>
<line x1="28"  y1="468" x2="372" y2="468" stroke="#c9a84c" stroke-width="0.7" opacity="0.35"/>
<line x1="28"  y1="572" x2="372" y2="572" stroke="#c9a84c" stroke-width="0.7" opacity="0.35"/>

<!-- Ornament dots -->
<text x="200" y="484" font-family="serif" font-size="7" fill="#c9a84c" text-anchor="middle"
      opacity="0.55" letter-spacing="10">&#x2726;  &#x2726;  &#x2726;</text>

<!-- Title: THE BONE / WOLF RIVER -->
<text x="200" y="516"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="28" font-weight="bold"
      fill="url(#goldGrad)"
      text-anchor="middle"
      letter-spacing="5">THE BONE</text>
<text x="200" y="548"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="28" font-weight="bold"
      fill="url(#goldGrad)"
      text-anchor="middle"
      letter-spacing="5">WOLF RIVER</text>

<!-- Author -->
<text x="200" y="565"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="9"
      fill="#c9a84c"
      text-anchor="middle"
      letter-spacing="3.5"
      opacity="0.72">CHASE ANTHONY RICCI SINGLETON</text>
</svg>
